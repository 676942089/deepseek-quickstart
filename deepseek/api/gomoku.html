<body>
<div class="game-container">
    <div class="board-wrapper">
        <canvas id="boardCanvas" width="520" height="520"></canvas>
    </div>
    <div class="controls">
        <div class="turn-indicator">
            <span id="turnText">黑棋走</span>
            <span class="turn-dot black-turn" id="turnDot"></span>
        </div>
        <div class="btn-group">
            <button class="btn" id="undoBtn">⟲ 悔棋</button>
            <button class="btn" id="restartBtn">↻ 重开</button>
        </div>
    </div>
</div>

<!-- 获胜模态框 -->
<div class="modal-overlay" id="winModal">
    <div class="modal">
        <span class="winner-emoji" id="winnerEmoji">⚫</span>
        <h2 id="winnerTitle">黑棋胜</h2>
        <p id="winnerSub">恭喜！</p>
        <button class="btn-close" id="modalCloseBtn">再来一局</button>
    </div>
</div>

<script>
    (function() {
        // ---------- 五子棋核心 ----------
        const SIZE = 15;                // 15x15 标准棋盘
        const EMPTY = 0, BLACK = 1, WHITE = 2;
        let board = Array(SIZE).fill().map(() => Array(SIZE).fill(EMPTY));
        let currentPlayer = BLACK;      // 黑先
        let gameOver = false;
        let history = [];              // 存储 { row, col, player }

        const canvas = document.getElementById('boardCanvas');
        const ctx = canvas.getContext('2d');
        const turnText = document.getElementById('turnText');
        const turnDot = document.getElementById('turnDot');
        const undoBtn = document.getElementById('undoBtn');
        const restartBtn = document.getElementById('restartBtn');
        const winModal = document.getElementById('winModal');
        const winnerTitle = document.getElementById('winnerTitle');
        const winnerEmoji = document.getElementById('winnerEmoji');
        const winnerSub = document.getElementById('winnerSub');
        const modalCloseBtn = document.getElementById('modalCloseBtn');

        // 棋盘绘制参数
        const padding = 30;
        const cellSize = (canvas.width - 2 * padding) / (SIZE - 1);

        // ---------- 绘图 ----------
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 木质底纹 (已由CSS提供，但canvas再叠一层网格)
            // 绘制网格线
            ctx.lineWidth = 1.8;
            ctx.strokeStyle = '#dac29c';
            ctx.shadowColor = '#00000055';
            ctx.shadowBlur = 6;

            // 画线 (横纵)
            for (let i = 0; i < SIZE; i++) {
                const x = padding + i * cellSize;
                const y = padding + i * cellSize;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(canvas.width - padding, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, padding);
                ctx.lineTo(x, canvas.height - padding);
                ctx.stroke();
            }
            ctx.shadowBlur = 0;

            // 画星位 (天元 + 小目)
            const starPoints = [
                [7,7], [3,3], [11,3], [3,11], [11,11]
            ];
            ctx.fillStyle = '#dac29c';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#00000066';
            for (let [r, c] of starPoints) {
                const x = padding + c * cellSize;
                const y = padding + r * cellSize;
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, 2 * Math.PI);
                ctx.fillStyle = '#b5926a';
                ctx.fill();
                ctx.fillStyle = '#e8d7b8';
                ctx.arc(x, y, 3, 0, 2 * Math.PI);
                ctx.fill();
            }
            ctx.shadowBlur = 0;

            // 画所有棋子 (带立体感)
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const val = board[r][c];
                    if (val === EMPTY) continue;
                    const x = padding + c * cellSize;
                    const y = padding + r * cellSize;
                    const radius = cellSize * 0.42;
                    // 阴影使棋子立体
                    ctx.shadowColor = '#00000099';
                    ctx.shadowBlur = 12;
                    ctx.shadowOffsetY = 3;

                    const gradient = ctx.createRadialGradient(x-6, y-6, radius*0.2, x, y, radius*1.2);
                    if (val === BLACK) {
                        gradient.addColorStop(0, '#6e6e6e');
                        gradient.addColorStop(0.3, '#2a2a2a');
                        gradient.addColorStop(0.8, '#0a0a0a');
                        gradient.addColorStop(1, '#1f1f1f');
                    } else {
                        gradient.addColorStop(0, '#fefefe');
                        gradient.addColorStop(0.4, '#dddddd');
                        gradient.addColorStop(0.8, '#b0b0b0');
                        gradient.addColorStop(1, '#8c8c8c');
                    }
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, 2 * Math.PI);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    // 高光
                    ctx.shadowBlur = 4;
                    ctx.shadowOffsetY = 1;
                    ctx.beginPath();
                    ctx.arc(x-4, y-4, radius*0.2, 0, 2*Math.PI);
                    ctx.fillStyle = val === BLACK ? '#b0b0b0' : '#ffffffcc';
                    ctx.fill();
                }
            }
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
        }

        // ---------- 检测五子连线 ----------
        function checkWin(row, col, player) {
            const directions = [[1,0],[0,1],[1,1],[1,-1]];
            for (let [dx, dy] of directions) {
                let count = 1;
                // 正方向
                for (let step = 1; step < 5; step++) {
                    const nr = row + dx * step, nc = col + dy * step;
                    if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) break;
                    if (board[nr][nc] !== player) break;
                    count++;
                }
                // 反方向
                for (let step = 1; step < 5; step++) {
                    const nr = row - dx * step, nc = col - dy * step;
                    if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) break;
                    if (board[nr][nc] !== player) break;
                    count++;
                }
                if (count >= 5) return true;
            }
            return false;
        }

        // ---------- 落子 ----------
        function placePiece(row, col) {
            if (gameOver) return false;
            if (row < 0 || row >= SIZE || col < 0 || col >= SIZE) return false;
            if (board[row][col] !== EMPTY) return false;

            board[row][col] = currentPlayer;
            history.push({ row, col, player: currentPlayer });

            // 检查胜利
            if (checkWin(row, col, currentPlayer)) {
                gameOver = true;
                drawBoard();
                showWinModal(currentPlayer);
                updateTurnDisplay();
                return true;
            }

            // 平局检查 (棋盘满了)
            let emptyCells = 0;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c] === EMPTY) emptyCells++;
                }
            }
            if (emptyCells === 0) {
                gameOver = true;
                drawBoard();
                showWinModal(0); // 平局
                updateTurnDisplay();
                return true;
            }

            // 切换玩家
            currentPlayer = (currentPlayer === BLACK) ? WHITE : BLACK;
            drawBoard();
            updateTurnDisplay();
            return true;
        }

        // ---------- 悔棋 ----------
        function undoMove() {
            if (gameOver) return;
            if (history.length === 0) return;
            const last = history.pop();
            board[last.row][last.col] = EMPTY;
            // 如果上一步之后游戏结束标记，但悔棋时重置
            if (history.length === 0) {
                currentPlayer = BLACK;
            } else {
                // 回到上一步的玩家
                const prev = history[history.length - 1];
                currentPlayer = (prev.player === BLACK) ? WHITE : BLACK;
            }
            gameOver = false;
            drawBoard();
            updateTurnDisplay();
        }

        // ---------- 重新开始 ----------
        function resetGame() {
            board = Array(SIZE).fill().map(() => Array(SIZE).fill(EMPTY));
            history = [];
            currentPlayer = BLACK;
            gameOver = false;
            winModal.classList.remove('active');
            drawBoard();
            updateTurnDisplay();
        }

        // ---------- 更新UI指示 ----------
        function updateTurnDisplay() {
            if (gameOver) {
                turnText.textContent = '对局结束';
                turnDot.className = 'turn-dot';
                return;
            }
            if (currentPlayer === BLACK) {
                turnText.textContent = '黑棋走';
                turnDot.className = 'turn-dot black-turn';
            } else {
                turnText.textContent = '白棋走';
                turnDot.className = 'turn-dot white-turn';
            }
        }

        // ---------- 获胜模态框 ----------
        function showWinModal(player) {
            if (player === 0) {
                winnerEmoji.textContent = '🤝';
                winnerTitle.textContent = '平局';
                winnerSub.textContent = '势均力敌，再来一局！';
            } else if (player === BLACK) {
                winnerEmoji.textContent = '⚫';
                winnerTitle.textContent = '黑棋胜利';
                winnerSub.textContent = '恭喜黑方！';
            } else {
                winnerEmoji.textContent = '⚪';
                winnerTitle.textContent = '白棋胜利';
                winnerSub.textContent = '恭喜白方！';
            }
            winModal.classList.add('active');
        }

        // ---------- 事件绑定 ----------
        function handleCanvasClick(e) {
            if (gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = (e.clientX - rect.left) * scaleX;
            const clientY = (e.clientY - rect.top) * scaleY;
            // 计算最近交叉点
            let minDist = cellSize * 0.6;
            let targetRow = -1, targetCol = -1;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const x = padding + c * cellSize;
                    const y = padding + r * cellSize;
                    const dist = Math.hypot(clientX - x, clientY - y);
                    if (dist < minDist) {
                        minDist = dist;
                        targetRow = r;
                        targetCol = c;
                    }
                }
            }
            if (targetRow !== -1 && targetCol !== -1) {
                placePiece(targetRow, targetCol);
            }
        }

        // 触摸支持
        function handleTouch(e) {
            e.preventDefault();
            if (gameOver) return;
            const touch = e.touches[0];
            if (!touch) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = (touch.clientX - rect.left) * scaleX;
            const clientY = (touch.clientY - rect.top) * scaleY;
            let minDist = cellSize * 0.6;
            let targetRow = -1, targetCol = -1;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const x = padding + c * cellSize;
                    const y = padding + r * cellSize;
                    const dist = Math.hypot(clientX - x, clientY - y);
                    if (dist < minDist) {
                        minDist = dist;
                        targetRow = r;
                        targetCol = c;
                    }
                }
            }
            if (targetRow !== -1 && targetCol !== -1) {
                placePiece(targetRow, targetCol);
            }
        }

        canvas.addEventListener('click', handleCanvasClick);
        canvas.addEventListener('touchstart', handleTouch, { passive: false });

        undoBtn.addEventListener('click', undoMove);
        restartBtn.addEventListener('click', resetGame);
        modalCloseBtn.addEventListener('click', () => {
            winModal.classList.remove('active');
            resetGame();
        });

        // 点击模态背景关闭（但保留关闭按钮）
        winModal.addEventListener('click', function(e) {
            if (e.target === winModal) {
                winModal.classList.remove('active');
                resetGame();
            }
        });

        // 初始化绘制
        resetGame();
    })();
</script>
</body>
</html>
